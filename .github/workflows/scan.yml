name: Security Scan

on:
  push:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'json'
        output: 'reports/trivy.json'

    - name: Commit report
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add reports/trivy.json
        git commit -m "Update scan report" || echo "No changes"
        git push